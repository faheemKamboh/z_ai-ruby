AllCops:
  TargetRubyVersion: 3.2

Metrics/AbcSize:
  Max: 20

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Max: 15

Naming/ClassAndModuleCamelCase:
  Exclude:
    - "lib/**/*.rb"
    - "spec/**/*.rb"
    - "z_ai.gemspec"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes
